name: 🚀 Feature Request
description: Propose a new feature or functionality.
title: "🚀 feat: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ### Propose a New Feature
        Use this template to suggest new functionality. Ensure your proposal aligns with our core principles of modularity and safe fallbacks.

  - type: dropdown
    id: priority
    attributes:
      label: "🚨 Priority"
      description: "How important is this feature for the project's roadmap?"
      options:
        - "🟢 Low (Nice to have, edge-case improvement)"
        - "🟡 Medium (Valuable addition for a majority of users)"
        - "🔴 High (Core functionality, blocking other systems)"
    validations:
      required: true

  - type: dropdown
    id: project_area
    attributes:
      label: "📂 Project Area"
      description: "Which part of the project does this affect primarily?"
      options:
        - "⚙️ Backend / Core Logic"
        - "🎨 Frontend / UI / UX"
        - "🔌 Integrations / APIs / Plugins"
        - "🤖 Automation / CI / Tooling"
        - "📝 Documentation / Concept"
        - "🤷 Unsure / General"
    validations:
      required: true

  - type: textarea
    id: goal
    attributes:
      label: "🎯 Goal / Problem Statement"
      description: "What problem does this solve? What is the overarching goal?"
      placeholder: "As a [role], I want to [action], so that [benefit]..."
    validations:
      required: true

  - type: textarea
    id: architecture
    attributes:
      label: "🏗️ Proposed Solution & Architecture"
      description: "How should this feature work technically? Keep Separation of Concerns in mind."
      placeholder: "Trigger/Input: ...\nCore Logic: ...\nOutput/UI: ..."
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: "📌 ToDo List"
      description: "Draft a preliminary task list for implementing this feature."
      value: |
        - [ ] 
    validations:
      required: false

  - type: checkboxes
    id: quality_check
    attributes:
      label: "🛡️ General Quality Check"
      description: "Ensure this feature adheres to general best practices."
      options:
        - label: "**Graceful Degradation:** The feature handles missing dependencies (plugins, specific folders, external apps) without fatal errors."
          required: true
        - label: "**Zero Assumption:** No hardcoded absolute system paths or assumptions about the user's local environment are used."
          required: true
