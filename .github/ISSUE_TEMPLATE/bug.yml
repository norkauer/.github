name: 🐛 Bug Report
description: Report a bug or unexpected behavior.
title: "🐛 bug: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ### Report a Bug
        Help us track down the issue. Clear steps to reproduce are the most important part of this report.

  - type: dropdown
    id: priority
    attributes:
      label: "🚨 Priority"
      description: "How severe is this issue?"
      options:
        - "🟢 Low (Cosmetic issue, minor annoyance, workaround exists)"
        - "🟡 Medium (Core feature broken, degrades workflow significantly)"
        - "🔴 High (Data loss, fatal crash, completely unusable system)"
    validations:
      required: true

  - type: dropdown
    id: project_area
    attributes:
      label: "📂 Project Area"
      description: "Where is the bug located?"
      options:
        - "⚙️ Backend / Core Logic"
        - "🎨 Frontend / UI / UX"
        - "🔌 Integrations / APIs / Plugins"
        - "🤖 Automation / Scripts / Tooling"
        - "📝 Documentation / Concept"
        - "🤷 Unsure / General"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "🔄 Steps to Reproduce"
      description: "What exactly needs to be done to trigger the bug?"
      placeholder: "1. Go to...\n2. Click on...\n3. See error..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "🎯 Expected Behavior (SHOULD)"
      description: "What did you expect to happen?"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "💥 Actual Behavior (IS)"
      description: "What actually happened instead? Include error messages or console logs if applicable."
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: "🖥️ Environment Details"
      description: "OS, Obsidian version, or specific plugin versions if relevant."
      placeholder: "OS: Windows 11 / Obsidian: v1.5.12 / Dataview: v0.5.64"
    validations:
      required: false

  - type: textarea
    id: tasks
    attributes:
      label: "📌 ToDo List / Fix Steps"
      description: "Draft a preliminary task list for debugging and fixing this bug."
      value: |
        - [ ] 
    validations:
      required: false

  - type: checkboxes
    id: quality_check
    attributes:
      label: "🛡️ Bugfix Quality Check"
      description: "Ensure the eventual fix adheres to our best practices."
      options:
        - label: "**Zero Assumption:** The bug will not be fixed by adding an environment-specific hack."
          required: false
        - label: "**Graceful Degradation:** The fix ensures that if this system fails again, it degrades gracefully instead of crashing."
          required: false
