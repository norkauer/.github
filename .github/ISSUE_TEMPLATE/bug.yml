name: 🐞 Bug Report
description: Report a bug or unexpected behavior.
title: "🐞 bug: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ### Bug Report
        Help us squash this bug by providing as much context as possible. 

  - type: textarea
    id: description
    attributes:
      label: "🐞 Describe the Bug"
      description: "A clear and concise description of what the bug is. What happened?"
      placeholder: "When executing the startup script, the system throws an error instead of loading the fallback config..."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: "🔄 Steps to Reproduce"
      description: "How can we trigger this bug? Please be specific."
      placeholder: |
        1. Open Vault '...'
        2. Trigger command '...'
        3. See error '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "✅ Expected Behavior"
      description: "What did you expect to happen instead?"
      placeholder: "The system should gracefully fall back to the standard explorer without throwing a red error notice."
    validations:
      required: true

  - type: dropdown
    id: project_area
    attributes:
      label: "Project Area"
      description: "Where does this bug occur?"
      options:
        - "⚙️ Backend / Core Logic"
        - "🎨 Frontend / UI / UX"
        - "🔌 Integrations / APIs / Plugins"
        - "🤖 Automation / Scripts / CI"
        - "🤷 Unsure / General"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: "🖥️ Environment / Context"
      description: "Specify your OS, App Version, or any missing dependencies (e.g., Windows 11, Obsidian v1.5.3, no FilePilot installed)."
    validations:
      required: false
