name: "auto-priority labeling module"

on:
  workflow_call:

permissions:
  issues: write

jobs:
  manage-priority-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Parse Issue Body and Manage Labels
        uses: actions/github-script@v7
        with:
          script: |
            const issueBody = context.payload.issue.body;
            
            // Graceful Degradation: Exit cleanly if payload is empty
            if (!issueBody) {
              console.log("No issue body found. Exiting gracefully.");
              return;
            }

            // Define priorities with correct emojis matching the issue templates
            const priorities = {
              high: { marker: '🔴 High', label: '🔴 High', color: 'd73a4a', description: 'High priority issue' },
              medium: { marker: '🟡 Medium', label: '🟡 Medium', color: 'fbca04', description: 'Medium priority issue' },
              low: { marker: '🟢 Low', label: '🟢 Low', color: '0e8a16', description: 'Low priority issue' }
            };

            let targetConfig = null;

            // Determine priority
            if (issueBody.includes(priorities.high.marker)) targetConfig = priorities.high;
            else if (issueBody.includes(priorities.medium.marker)) targetConfig = priorities.medium;
            else if (issueBody.includes(priorities.low.marker)) targetConfig = priorities.low;

            if (!targetConfig) {
              console.log("No priority marker found in issue body. Skipping label assignment.");
              return;
            }

            const targetLabelName = targetConfig.label;

            // ZERO ASSUMPTION: Check if the label exists in the CALLING repo
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: targetLabelName
              });
              console.log(`Label '${targetLabelName}' already exists.`);
            } catch (error) {
              if (error.status === 404) {
                console.log(`Label '${targetLabelName}' not found. Creating it dynamically...`);
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: targetLabelName,
                  color: targetConfig.color,
                  description: targetConfig.description
                });
              } else {
                console.error("API error during label verification:", error);
                return;
              }
            }

            // Fetch currently applied labels on the issue
            const currentLabelsResponse = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            const currentLabels = currentLabelsResponse.data.map(l => l.name);

            // Separation of Concerns: Clean up outdated labels
            for (const key in priorities) {
              const iterLabelName = priorities[key].label;
              if (currentLabels.includes(iterLabelName) && iterLabelName !== targetLabelName) {
                console.log(`Removing outdated priority label: ${iterLabelName}`);
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: iterLabelName
                });
              }
            }

            // Apply the target label
            if (!currentLabels.includes(targetLabelName)) {
              console.log(`Applying target label: ${targetLabelName}`);
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [targetLabelName]
              });
            }