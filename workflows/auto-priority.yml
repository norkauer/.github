name: 🤖 Auto-Label Priority

on:
  issues:
    types: [opened, edited]

jobs:
  assign-priority-label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Parse Issue Body and Manage Labels
        uses: actions/github-script@v7
        with:
          script: |
            const issueBody = context.payload.issue.body;
            if (!issueBody) return;

            // Define our priority identifiers based on the YAML templates
            const priorities = {
              high: { marker: '🔴 High', label: '🔴 High' },
              medium: { marker: '🟡 Medium', label: '🟡 Medium' },
              low: { marker: '🟢 Low', label: '🟢 Low' }
            };

            let targetLabel = null;

            // Determine which priority was selected in the dropdown
            if (issueBody.includes(priorities.high.marker)) targetLabel = priorities.high.label;
            else if (issueBody.includes(priorities.medium.marker)) targetLabel = priorities.medium.label;
            else if (issueBody.includes(priorities.low.marker)) targetLabel = priorities.low.label;

            // If no priority is found, degrade gracefully and do nothing
            if (!targetLabel) {
              console.log("No priority marker found in issue body. Skipping.");
              return;
            }

            // Fetch currently applied labels
            const currentLabelsResponse = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            const currentLabels = currentLabelsResponse.data.map(l => l.name);

            // Remove existing priority labels if they differ from the new target
            for (const key in priorities) {
              const labelName = priorities[key].label;
              if (currentLabels.includes(labelName) && labelName !== targetLabel) {
                console.log(`Removing outdated label: ${labelName}`);
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: labelName
                });
              }
            }

            // Apply the new target label if it's not already there
            if (!currentLabels.includes(targetLabel)) {
              console.log(`Adding new label: ${targetLabel}`);
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [targetLabel]
              });
            }
